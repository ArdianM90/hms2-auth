<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS - Logowanie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background-image:
                    linear-gradient(
                            rgba(70,14,25,0.75),
                            rgba(70,14,25,0.75)
                    ),
                    url('/images/hotel-background.jpg');

            background-size: cover;
            background-position: center;
        }

        .container {
            display: flex;
            width: 900px;
            max-width: 95%;
            min-height: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
        }

        .image-panel {
            flex: 1;
            background-image: url('/images/hotel-background.jpg');
            background-size: 200%;
            background-position: center;
        }

        .login-panel {
            width: 420px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 700;
            color: #6b1020;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d8d8d8;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #6b1020;
            box-shadow: 0 0 0 3px rgba(107, 16, 32, 0.15);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #6b1020;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-button:hover {
            background: #87182b;
        }

        .error {
            margin-bottom: 15px;
            padding: 12px;
            background: #fff0f0;
            color: #b42318;
            border: 1px solid #f3c7c7;
            border-radius: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="image-panel"></div>
    <div class="login-panel">
        <div class="logo">
            HMS
        </div>
        <div class="subtitle">
            Hotel Management System
        </div>
        <form method="POST" action="/login">
            <input
                    type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}"
            />
            <div
                    class="error"
                    th:if="${param.error}">
                Nieprawidłowy login lub hasło.
            </div>
            <div class="form-group">
                <input
                        type="text"
                        name="username"
                        placeholder="Nazwa użytkownika"
                        required
                />
            </div>
            <div class="form-group">
                <input
                        type="password"
                        name="password"
                        placeholder="Hasło"
                        required
                />
            </div>
            <button
                    type="submit"
                    class="login-button">
                Zaloguj
            </button>
        </form>
        <div class="footer">
            &copy; <span th:text="${#dates.year(#dates.createNow())}"></span>
            Adrian Mieńkowski
        </div>
    </div>
</div>
</body>
</html>
